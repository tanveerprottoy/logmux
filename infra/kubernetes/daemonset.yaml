apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: logmux-daemon
  namespace: kube-system
  labels:
    app: logmux-daemon
spec:
  selector:
    matchLabels:
      app: logmux-daemon
  template:
    metadata:
      labels:
        app: logmux-daemon
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: logmux-daemon
          image: ghcr.io/logmux/daemon:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: LOGMUX_LOG_DIR
              value: /var/log/pods
            - name: LOGMUX_AGGREGATOR
              value: "logmux-aggregator.logmux.svc.cluster.local:8080"
          securityContext:
            runAsUser: 0
            privileged: true
          volumeMounts:
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers